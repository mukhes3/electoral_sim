name: "Two-Party Symmetric Polarized"
description: >
  Two equal-sized voter clusters symmetrically placed on the economic axis.
  Each party has three candidates spanning from moderate to extreme.
  The classic case for studying how primary electorate composition
  affects nominee positioning — closed primaries pull nominees outward,
  open primaries allow centrist pressure.
real_world_analog: "Stylised US two-party system"
n_dims: 2
n_voters: 6000
dim_names: ["economic (left-right)", "social (libertarian-authoritarian)"]

electorate:
  type: gaussian_mixture
  components:
    - weight: 0.50
      mean: [0.22, 0.42]
      cov: [[0.022, 0.006], [0.006, 0.022]]
    - weight: 0.50
      mean: [0.78, 0.58]
      cov: [[0.022, -0.006], [-0.006, 0.022]]

candidates:
  type: fixed
  positions:
    # Left party slate
    - name: "L-Far-Left"
      position: [0.08, 0.28]
    - name: "L-Left"
      position: [0.20, 0.38]
    - name: "L-Moderate"
      position: [0.35, 0.46]
    # Right party slate
    - name: "R-Moderate"
      position: [0.65, 0.54]
    - name: "R-Right"
      position: [0.80, 0.62]
    - name: "R-Far-Right"
      position: [0.92, 0.76]

parties:
  left:
    name: "Left Party"
    candidate_indices: [0, 1, 2]
  right:
    name: "Right Party"
    candidate_indices: [3, 4, 5]
